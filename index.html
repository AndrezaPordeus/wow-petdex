<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WoW Petdex</title>
    <link rel="icon" href="./assets/favicon.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <h1>WoW Petdex</h1>
        <p class="subtitulo">A enciclopédia de mascotes de batalha com dados oficiais da Blizzard</p>
    </header>

    <main>

        <section class="busca-container">
            <button id="btn-voltar-inicio" class="btn-voltar">Início</button>
            <input type="text" id="campo-pesquisa" placeholder="Sobre qual pet você deseja saber?">
            <select id="filtro-tipo" class="filtro-tipo">
                <option value="">Todos os tipos</option>
                <option value="Fera">Fera</option>
                <option value="Dragão">Dragão</option>
                <option value="Voador">Voador</option>
                <option value="Mágico">Mágico</option>
                <option value="Mecânico">Mecânico</option>
                <option value="Morto-vivo">Morto-vivo</option>
                <option value="Aquático">Aquático</option>
                <option value="Elemental">Elemental</option>
                <option value="Bicho">Bicho</option>
                <option value="Humanóide">Humanóide</option>
            </select>
            <button id="btn-consultar">Consultar Grimório</button>
        </section>

        <section id="resultados-pesquisa" class="resultados-pesquisa">
            <p class="mensagem-inicial">O grimório está fechado. Faça uma pesquisa para revelar os segredos.</p>
        </section>

    </main>

    <footer>
        <p>| Desenvolvido por Andreza Alves Pordeus | Dados oficiais da Blizzard API |</p>
    </footer>

    <script type="module" src="./index.js"></script>
</body>
</html>
